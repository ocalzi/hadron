---
name: Build Tools Updates

sources:
  flex:
    kind: gittag
    spec:
      url: https://github.com/westes/flex.git
      versionfilter:
        kind: semver
        pattern: '*'
    transformers:
      - trimprefix: v
      - sort:
          method: semver
      - semver:
          constraint: '*'

  pkgconfig:
    kind: gittag
    spec:
      url: https://github.com/pkgconf/pkgconf.git
    transformers:
      - trimprefix: pkgconf-
      - sort:
          method: semver
      - semver:
          constraint: '*'

  bison:
    # Much faster to query this thant to use the gittag which actually clones the repository fully
    kind: shell
    spec:
      command: |
        git ls-remote --refs --tags https://https.git.savannah.gnu.org/git/bison.git | grep -v '\^{}' \
        | awk -F/ '{print $NF}' \
        | sort -V |tail -n 1
    transformers:
      - trimprefix: v
      - sort:
          method: semver

  autoconf:
    # Much faster to query this thant to use the gittag which actually clones the repository fully
    kind: shell
    spec:
      command: |
        git ls-remote --refs --tags git://git.savannah.gnu.org/autoconf.git | grep -v '\^{}' \
        | awk -F/ '{print $NF}' | grep -E '^v[0-9]+\.[0-9]+$' \
        | sort -V |tail -n 1
    transformers:
      - trimprefix: v
      - sort:
          method: semver

  automake:
    # Much faster to query this thant to use the gittag which actually clones the repository fully
    kind: shell
    spec:
      command: |
        git ls-remote --refs --tags git://git.savannah.gnu.org/automake.git | grep -v '\^{}' \
        | awk -F/ '{print $NF}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
        | sort -V |tail -n 1
    transformers:
      - trimprefix: v
      - sort:
          method: semver

  libtool:
    # Much faster to query this thant to use the gittag which actually clones the repository fully
    kind: shell
    spec:
      # Somehow they cut the tag 2.6.0 but its marked as alpha?? weird, so exclude it from the results
      command: |
        git ls-remote --refs --tags https://https.git.savannah.gnu.org/git/libtool.git | grep -v '\^{}' \
        | awk -F/ '{print $NF}' \
        | sort -V | grep -v "v2.6" |tail -n 1
    transformers:
      - trimprefix: v
      - sort:
          method: semver

  cmake:
    # Much faster to query this thant to use the gittag which actually clones the repository fully
    kind: shell
    spec:
      command: |
        git ls-remote --refs --tags https://github.com/Kitware/CMake.git | grep -v '\^{}' \
        | awk -F/ '{print $NF}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
        | sort -V |tail -n 1
    transformers:
      - trimprefix: v
      - sort:
          method: semver

  make:
    kind: gittag
    spec:
      url: https://https.git.savannah.gnu.org/git/make.git
    transformers:
      - trimprefix: v
      - sort:
          method: semver
      - semver:
          constraint: '*'

  m4:
    kind: gittag
    spec:
      url: https://https.git.savannah.gnu.org/git/m4.git
    transformers:
      - trimprefix: v
      - sort:
          method: semver
      - semver:
          constraint: '*'

  gawk:
    # Much faster to query this thant to use the gittag which actually clones the repository fully
    kind: shell
    spec:
      command: |
        git ls-remote --refs --tags https://https.git.savannah.gnu.org/git/gawk.git | grep -v '\^{}' \
        | awk -F/ '{print $NF}' | grep -E '^gawk-[0-9]+\.[0-9]+(\.[0-9]+)?' \
        | sort -V | tail -n 1
    transformers:
      - trimprefix: gawk-


  binutils:
    # Much faster to query this thant to use the gittag which actually clones the repository fully
    # Somehow they changed behaviour here. When the tag was 2.45 or 2.44 etc... they released the archives as
    # 2.45.tar.gx or 2.44.tar.gz but ont his last tag they put 2.46 and released it as 2.46.0.tar.gz so we need to add a special case for this one
    kind: shell
    spec:
      command: |
        git ls-remote --refs --tags git://sourceware.org/git/binutils-gdb.git | grep -v '\^{}' \
        | awk -F/ '{print $NF}' | grep -E '^binutils-[0-9]+_[0-9]+(_[0-9]+)?$' \
        | sort -V | tail -n 1
    transformers:
      - trimprefix: binutils-
      - replacer:
          from: '_'
          to: '.'
      - replacer:
          from: '^2\.46$'
          to: '2.46.0'
      - sort:
          method: semver

targets:
  flex:
    name: FLEX_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: FLEX_VERSION
    sourceid: flex

  bison:
    name: BISON_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: BISON_VERSION
    sourceid: bison

  autoconf:
    name: AUTOCONF_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: AUTOCONF_VERSION
    sourceid: autoconf

  automake:
    name: AUTOMAKE_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: AUTOMAKE_VERSION
    sourceid: automake

  libtool:
    name: LIBTOOL_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: LIBTOOL_VERSION
    sourceid: libtool

  cmake:
    name: CMAKE_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: CMAKE_VERSION
    sourceid: cmake

  make:
    name: MAKE_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: MAKE_VERSION
    sourceid: make

  m4:
    name: M4_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: M4_VERSION
    sourceid: m4

  gawk:
    name: GAWK_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: GAWK_VERSION
    sourceid: gawk

  pkgconfig:
    name: PKGCONFIG_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: PKGCONFIG_VERSION
    sourceid: pkgconfig

  binutils:
    name: BINUTILS_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: BINUTILS_VERSION
    sourceid: binutils