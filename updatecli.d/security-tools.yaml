---
name: Security Tools Updates

sources:
  openssl:
    kind: githubrelease
    spec:
      owner: openssl
      repository: openssl
      versionfilter:
        kind: regex/semver
        # capture group 1 is the semver
        regex: '^openssl-([0-9]+\.[0-9]+\.[0-9]+)$'
        pattern: '*'
    transformers:
      - trimprefix: openssl-

  openssh:
    kind: gittag
    spec:
      url: https://github.com/openssh/openssh-portable.git
      versionfilter:
        kind: regex
        pattern: '^V_[0-9]+_[0-9]+_P[0-9]+$'
    transformers:
      - trimprefix: V_
      - replacer: { from: "_P", to: "p" }
      - replacer: { from: "_",  to: "." }
      # IMPORTANT: sort must happen on something sortable.
      # 10.2p1 is not semver, so use lexical/alphanum sort.
      - sort:
          method: alphanum

  sudo:
    kind: githubrelease
    spec:
      owner: sudo-project
      repository: sudo
    transformers:
      - trimprefix: v

  pam:
    kind: gittag
    spec:
      url: https://github.com/linux-pam/linux-pam.git
      versionfilter:
        kind: semver
        pattern: '*'
    transformers:
      - trimprefix: v

  shadow:
    kind: githubrelease
    spec:
      owner: shadow-maint
      repository: shadow

  cryptsetup:
    kind: gittag
    spec:
      url: https://gitlab.com/cryptsetup/cryptsetup.git
      versionfilter:
        kind: semver
        pattern: '*'
    transformers:
      - trimprefix: v

targets:
  openssl:
    name: OPENSSL_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: OPENSSL_VERSION
    sourceid: openssl

  openssh:
    name: OPENSSH_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: OPENSSH_VERSION
    sourceid: openssh

  sudo:
    name: SUDO_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: SUDO_VERSION
    sourceid: sudo

  pam:
    name: PAM_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: PAM_VERSION
    sourceid: pam

  shadow:
    name: SHADOW_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: SHADOW_VERSION
    sourceid: shadow

  cryptsetup:
    name: CRYPTSETUP_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: CRYPTSETUP_VERSION
    sourceid: cryptsetup
