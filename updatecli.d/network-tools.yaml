---
name: Network Tools Updates

sources:
  iptables:
    kind: gittag
    spec:
      url: git://git.netfilter.org/iptables
      versionfilter:
        kind: semver
        pattern: '*'
    transformers:
      - trimprefix: v

  open_iscsi:
    kind: gittag
    spec:
      url: https://github.com/open-iscsi/open-iscsi.git
      versionfilter:
        kind: semver
        pattern: '*'

  strace:
    kind: gittag
    spec:
      url: https://github.com/strace/strace
      versionfilter:
        kind: semver
        pattern: '*'
    transformers:
      - trimprefix: v

targets:
  iptables:
    name: IPTABLES_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: IPTABLES_VERSION
    sourceid: iptables

  open_iscsi:
    name: OPEN_SCSI_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: OPEN_SCSI_VERSION
    sourceid: open_iscsi

  strace:
    name: STRACE_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: STRACE_VERSION
    sourceid: strace
