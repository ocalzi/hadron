---
name: Storage Tools Updates


sources:
  lvm2:
    kind: gittag
    spec:
      url: https://gitlab.com/lvmteam/lvm2.git
      lsremote: true
      versionfilter:
        kind: regex
        pattern: '^v[0-9]+_[0-9]+_[0-9]+$'
    transformers:
      - trimprefix: v
      - sort:
          method: alphanum
      - replacer:
          from: '_'
          to: '.'

  multipath:
    kind: gittag
    spec:
      url: https://github.com/opensvc/multipath-tools.git
      lsremote: true
      versionfilter:
        kind: semver
        pattern: '*'

  e2fsprogs:
    kind: gittag
    spec:
      url: git://git.kernel.org/pub/scm/fs/ext2/e2fsprogs.git
      lsremote: true
    transformers:
      - trimprefix: v
      - sort:
          method: semver
      - semver:
          constraint: '*'

  dosfstools:
    kind: gittag
    spec:
      url: https://github.com/dosfstools/dosfstools.git
      lsremote: true
    transformers:
      - trimprefix: v

  parted:
    # Much faster to query this thant to use the gittag which actually clones the repository fully
    kind: gittag
    spec:
      url: https://git.savannah.gnu.org/git/parted.git
      lsremote: true
    transformers:
      - trimprefix: v
      - sort:
          method: semver
      - semver:
          constraint: '*'

  urcu:
    kind: gittag
    spec:
      url: https://github.com/urcu/userspace-rcu.git
      lsremote: true
      versionfilter:
        kind: semver
        pattern: '*'
    transformers:
      - trimprefix: v

targets:
  lvm2:
    name: LVM2_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: LVM2_VERSION
    sourceid: lvm2

  multipath:
    name: MULTIPATH_TOOLS_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: MULTIPATH_TOOLS_VERSION
    sourceid: multipath

  e2fsprogs:
    name: E2FSPROGS_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: E2FSPROGS_VERSION
    sourceid: e2fsprogs

  dosfstools:
    name: DOSFSTOOLS_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: DOSFSTOOLS_VERSION
    sourceid: dosfstools

  parted:
    name: PARTED_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: PARTED_VERSION
    sourceid: parted

  urcu:
    name: URCU_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: URCU_VERSION
    sourceid: urcu
