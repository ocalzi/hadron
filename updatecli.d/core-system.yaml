---
name: Core System Updates

sources:
  musl:
    kind: gittag
    spec:
      url: git://git.musl-libc.org/musl
      lsremote: true
      versionfilter:
        kind: semver
        pattern: "v*"
    transformers:
      - trimprefix: v

  busybox:
    kind: gittag
    spec:
      url: git://git.busybox.net/busybox
    transformers:
      - replacer:
          from: '_'
          to: '.'

  systemd:
    kind: gittag
    spec:
      url: https://github.com/systemd/systemd.git
      lsremote: true
      versionfilter:
        kind: semver
        pattern: "v*"
    transformers:
      - trimprefix: v

  util_linux:
    kind: gittag
    spec:
      url: https://github.com/util-linux/util-linux.git
      lsremote: true
      versionfilter:
        kind: semver
        pattern: "*"
        replaceall:
          pattern: "^v"
          replacement: ""
    transformers:
      - trimprefix: v

  coreutils:
    kind: githubrelease
    spec:
      owner: coreutils
      repository: coreutils
    transformers:
      - trimprefix: v

  findutils:
    kind: gittag
    spec:
      url: git://git.git.savannah.gnu.org/findutils.git
      lsremote: true
      versionfilter:
        kind: semver
        pattern: "v*"
    transformers:
      - trimprefix: v

  grep:
    kind: gittag
    spec:
      url: git://git.git.savannah.gnu.org/grep.git
      lsremote: true
      versionfilter:
        kind: semver
        pattern: "v*"
    transformers:
      - trimprefix: v

  gperf:
    kind: gittag
    spec:
      url: git://git.git.savannah.gnu.org/gperf.git
      lsremote: true
      versionfilter:
        kind: semver
        pattern: "v*"
    transformers:
      - trimprefix: v

  diffutils:
    kind: gittag
    spec:
      url: git://git.git.savannah.gnu.org/diffutils.git
      lsremote: true
      versionfilter:
        kind: semver
        pattern: "v*"
    transformers:
      - trimprefix: v

  readline:
    kind: gittag
    spec:
      url: git://git.git.savannah.gnu.org/readline.git
      lsremote: true
      versionfilter:
        kind: regex
        pattern: "^readline-(\\d+\\.\\d+)$"
    transformers:
      - trimprefix: readline-

  bash:
    kind: gittag
    spec:
      url: git://git.git.savannah.gnu.org/bash.git
      lsremote: true
      versionfilter:
        kind: regex
        pattern: ^bash-(\d+\.\d+)$
    transformers:
      - trimprefix: bash-


targets:
  musl:
    name: MUSL_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: MUSL_VERSION
    sourceid: musl

  busybox:
    name: BUSYBOX_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: BUSYBOX_VERSION
    sourceid: busybox

  systemd:
    name: SYSTEMD_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: SYSTEMD_VERSION
    sourceid: systemd

  util_linux:
    name: UTIL_LINUX_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: UTIL_LINUX_VERSION
    sourceid: util_linux

  coreutils:
    name: COREUTILS_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: COREUTILS_VERSION
    sourceid: coreutils

  findutils:
    name: FINDUTILS_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: FINDUTILS_VERSION
    sourceid: findutils

  grep:
    name: GREP_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: GREP_VERSION
    sourceid: grep

  gperf:
    name: GPERF_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: GPERF_VERSION
    sourceid: gperf

  diffutils:
    name: DIFFUTILS_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: DIFFUTILS_VERSION
    sourceid: diffutils

  readline:
    name: READLINE_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: READLINE_VERSION
    sourceid: readline

  bash:
    name: BASH_VERSION in Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: BASH_VERSION
    sourceid: bash
