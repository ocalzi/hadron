---
name: 'PR build and test images (riscv64)'

on:
  pull_request:

concurrency:
  group: ci-image-riscv64-${{ github.head_ref || github.ref }}-${{ github.repository }}
  cancel-in-progress: true

# Everything runs on oracle-vm-32cpu-128gb-x86-64 with QEMU RISC-V emulation.
# The Dockerfile has no FROM --platform overrides, so every stage executes riscv64
# binaries regardless of runner.  QEMU on 32 cores + 128 GB beats native RISC-V on
# 4 cores + 16 GB: the RAM headroom alone prevents swap during large builds (kernel,
# systemd, cmake), and 32 parallel QEMU processes match ~4 native cores in throughput.
#
# The build is split into small sequential and parallel jobs so each individual job
# is time-bounded and its result is written to the quay cache.  Subsequent jobs only
# compile the delta on top of what is already cached, meaning a timeout or failure
# only loses one small step rather than the entire multi-hour toolchain build.
#
# Dependency graph (→ = "depends on"):
#
#   stage0 → stage1 → rsync ─┬→ cmake ───┐
#                             ├→ kernel ──┤
#                             ├→ systemd ─┤→ toolchain → container → hadron-grub → …
#                             └→ python ──┘

jobs:
  # ── 1 ─ mussel cross-compiler ────────────────────────────────────────────────
  stage0:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      - name: Build stage0 (mussel cross-compiler)
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          labels: ${{ steps.meta.outputs.labels }}
          target: stage0
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage0-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64

  # ── 2 ─ stage1-merge: musl/gcc/binutils/kernel-headers rebuilt for target ───
  stage1:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: [stage0]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      - name: Build stage1-merge
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          labels: ${{ steps.meta.outputs.labels }}
          target: stage1-merge
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage0-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage1-merge-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64

  # ── 3 ─ rsync: the chain stage1→xxhash→zstd→lz4→attr→acl→zlib→gawk→rsync ───
  # rsync is the base FROM image for the majority of packages; caching it here
  # avoids rebuilding this chain independently in each of the parallel jobs below.
  rsync:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: [stage1]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      - name: Build rsync stage (and its full dependency chain)
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          labels: ${{ steps.meta.outputs.labels }}
          target: rsync
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage0-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage1-merge-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:rsync-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64

  # ── 4a-4d ─ parallel cache-warming: the four most expensive independent builds
  # Each job reads all upstream caches and writes only its own delta.
  # They all run in parallel, so wall-clock time = max(cmake, kernel, systemd, python)
  # instead of sum.

  cmake:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: [rsync]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      - name: Build cmake
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          labels: ${{ steps.meta.outputs.labels }}
          target: cmake
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage0-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage1-merge-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:rsync-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:cmake-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64

  kernel:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: [rsync]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      # kernel-misc captures kernel-build + kernel-modules in one shot.
      # KERNEL_TYPE=cloud matches what hadron-grub uses for RISC-V.
      - name: Build kernel + modules (kernel-misc target)
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          labels: ${{ steps.meta.outputs.labels }}
          target: kernel-misc
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage0-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage1-merge-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:rsync-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:kernel-misc-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64
            KERNEL_TYPE=cloud

  systemd:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: [rsync]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      - name: Build systemd
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          labels: ${{ steps.meta.outputs.labels }}
          target: systemd
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage0-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage1-merge-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:rsync-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:systemd-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64

  python:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: [rsync]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      # python-build is the base for dbus, pam, kmod, pax-utils, grub-base, and openscsi.
      - name: Build python-build
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          labels: ${{ steps.meta.outputs.labels }}
          target: python-build
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage0-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage1-merge-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:rsync-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:python-build-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64

  # ── 5 ─ assemble the full toolchain ──────────────────────────────────────────
  # By now all expensive sub-builds are in the cache.  This job only has to run
  # the remaining packages and the final full-toolchain-merge → scratch copy.
  toolchain:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: [cmake, kernel, systemd, python]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      - name: Build toolchain
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          push: true
          tags: ttl.sh/hadron-toolchain-riscv64:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          target: toolchain
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage0-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:stage1-merge-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:rsync-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:cmake-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:kernel-misc-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:systemd-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:python-build-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:toolchain-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64

  container:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: [toolchain]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      - name: Build container
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          push: true
          tags: ttl.sh/hadron-container-riscv64:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          target: container
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:toolchain-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:container-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64
      - name: Test container image
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          target: container-test
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:toolchain-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:container-riscv64,mode=max
          build-args: |
            ARCH=riscv64
            BUILD_ARCH=riscv64

  hadron-grub:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: [container]
    strategy:
      matrix:
        kernel: ["cloud"]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
      - name: Build default image
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/riscv64
          push: true
          tags: ttl.sh/hadron-riscv64${{ matrix.kernel == 'cloud' && '-cloud' || '' }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          target: default
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:toolchain-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:container-riscv64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:grub-${{ matrix.kernel }}-riscv64,mode=max
          build-args: |
            BOOTLOADER=grub
            KERNEL_TYPE=${{ matrix.kernel }}
            ARCH=riscv64
            BUILD_ARCH=riscv64

  # There's a short circuit here since we haven't released kairos-init for riscv64 because it needs hadron to at least pass tests on one OS. For now let's just release a version on main so we can test that on kairos-init and then we decide if we do the tests here too and how to make the dependency less problematic
