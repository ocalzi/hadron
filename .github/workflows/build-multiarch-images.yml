        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}-container:${{ github.ref_name }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          target: container
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:toolchain-arm64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:container-arm64,mode=max
          cache-to: ${{ github.ref_name == 'main' && 'type=registry,ref=quay.io/kairos/hadron-build-cache:container-arm64,mode=max,ignore-error=true,compression=zstd,compression-level=3,oci-mediatypes=true,image-manifest=true' || 'type=inline,ignore-error=true' }}
          build-args: |
            ARCH=aarch64
            BUILD_ARCH=aarch64
  container:
    needs:
      - container-amd64
      - container-arm64
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: docker/login-action@v3
