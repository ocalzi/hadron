            ^${{ github.ref_name }}-arm64$
            ^${{ github.ref_name }}-riscv64$
  hadron-bios-amd64:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs:
      - container  # Take advantage of cached layers from the container build
    strategy:
      matrix:
        kernel: [ "cloud", "default" ]
        fips: [ "no-fips" ]
        include:
          - kernel: "cloud"
            fips: "fips"
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout
