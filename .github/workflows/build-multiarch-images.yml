    needs:
      - hadron-trusted-amd64
      - hadron-trusted-arm64
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    strategy:
      matrix:
        kernel: [ "cloud", "default" ]
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: metadata
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.kernel == 'cloud' && '-cloud' || '' }}-trusted
          labels: |
            org.opencontainers.image.licenses=Apache-2.0
      - uses: int128/docker-manifest-create-action@v2
        id: build
        with:
          index-annotations: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
          sources: |
            ghcr.io/${{ github.repository }}${{ matrix.kernel == 'cloud' && '-cloud' || '' }}-trusted:${{ github.ref_name }}-amd64
            ghcr.io/${{ github.repository }}${{ matrix.kernel == 'cloud' && '-cloud' || '' }}-trusted:${{ github.ref_name }}-arm64
      - uses: vlaurin/action-ghcr-prune@v0.6.0
        with:
          container: "${{ github.event.repository.name }}${{ matrix.kernel == 'cloud' && '-cloud' || '' }}-trusted"
          token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: 'false'
          keep-tags-regexes: |
            ^main$
            ^v\d+\.\d+\.\d+(-(beta|alpha|rc)[\.-]?\d*)?$
          prune-tags-regexes: |
            ^${{ github.ref_name }}-amd64$
            ^${{ github.ref_name }}-arm64$

  # ============================================================================
  # RISC-V 64-bit pipeline
  # ============================================================================
  # RISC-V builds use QEMU emulation on x86-64 runners. The build is split into
  # sequential stages to maximize cache reuse and avoid timeouts.
  #
  # Dependency graph:
  #   stage0-riscv64 → stage1-riscv64 → rsync-riscv64 ─┬→ cmake-riscv64 ───┐
  #                                                     ├→ kernel-riscv64 ──┤
  #                                                     ├→ systemd-riscv64 ─┤
