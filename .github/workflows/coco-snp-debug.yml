---
name: 'SNP debug build (coco-ci-trigger branch)'

on:
  push:
    branches:
      - coco-ci-trigger

concurrency:
  group: coco-snp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadron-cloud:
    runs-on: oracle-vm-32cpu-128gb-x86-64
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: Build and push Hadron (cloud kernel, grub)
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ttl.sh/hadron-cloud-amd64:${{ github.sha }}
          target: default
          cache-from: |
            type=registry,ref=quay.io/kairos/hadron-build-cache:toolchain-amd64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:container-amd64,mode=max
            type=registry,ref=quay.io/kairos/hadron-build-cache:bios-cloud-no-fips-amd64,mode=max
          build-args: |
            BOOTLOADER=grub
            KERNEL_TYPE=cloud

      - name: Print next steps
        run: |
          echo "### Cloud image ready" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "RAW_IMAGE=ttl.sh/hadron-cloud-amd64:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# 1. Finalize (runs kairos-init locally):" >> "$GITHUB_STEP_SUMMARY"
          echo "./finalize-hadron.sh \$RAW_IMAGE" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# 2. Upload and register as AMI:" >> "$GITHUB_STEP_SUMMARY"
          echo "AWS_PROFILE=kairos AWS_S3_BUCKET=kairos-qa-images SKIP_BUILD=true FORCE=true \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  ./upload-dev-ami.sh ttl.sh/hadron-finalized:<timestamp>" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ttl.sh images expire after 24 h — finalize and test promptly." >> "$GITHUB_STEP_SUMMARY"
