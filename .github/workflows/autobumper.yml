name: Updatecli

on:
  workflow_dispatch:
  # Trigger Updatecli once day by a cronjob
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run once a day
    - cron: "0 0 * * *"

permissions:
  # Required by Updatecli to create Git Commit(s)
  contents: "write"
  # Required by Updatecli to open GitHub pull request
  pull-requests: "write"
  # Required by Updatecli to update GitHub action workflows
  actions: "write"

jobs:
  updatecli:
    runs-on: "ubuntu-latest"
    strategy:
        matrix:
            config:
              - build-tools
              - compiler-tools
              - compression-tools
              - core-system
              - kernel-and-boot
              - misc-tools
              - network-tools
              - security-tools
              - storage-tools
              - system-libraries
    steps:
      - name: Install Updatecli in the runner
        uses: updatecli/updatecli-action@v2
      - name: commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -ex
          # Check if fork exists, create if not
          if ! gh repo view ci-forks/hadron --json name > /dev/null 2>&1; then
            echo "Fork does not exist. Creating fork..."
            gh repo fork kairos-io/hadron --clone=false --remote=false --org ci-forks
          else
            echo "Fork already exists."
          fi
          
          # Clone fork using HTTPS with the token embedded in the URL; credentials are not stored on disk
          git clone "https://ci-forks:${GITHUB_TOKEN}@github.com/ci-forks/hadron.git" fork
          cd fork
          
          # Ensure all pushes go to the fork using the authenticated URL
          git remote set-url origin "https://ci-forks:${GITHUB_TOKEN}@github.com/ci-forks/hadron.git"
          
          # Add upstream and sync main
          git remote add upstream https://github.com/kairos-io/hadron || true
          git fetch upstream
          git checkout main
          git reset --hard upstream/main
          git push origin main --force
          
          # Fetch all branches
          git fetch origin
          
          # Check if remote bumps branch exists
          if git ls-remote --exit-code --heads origin bumps-${{ matrix.config }}-${{ github.sha }} > /dev/null; then
            echo "Remote 'bumps-${{ matrix.config }}-${{ github.sha }}' branch exists. Checking it out."
            git checkout bumps-${{ matrix.config }}-${{ github.sha }}
          else
            echo "Remote 'bumps-${{ matrix.config }}-${{ github.sha }}' branch does not exist. Creating from upstream/main."
            git checkout -B bumps-${{ matrix.config }}-${{ github.sha }} upstream/main
          fi
          
          git reset --hard upstream/main
          
          updatecli apply --config updatecli.d/${{ matrix.config }}.yaml
          
          git add Dockerfile
          
          # Check if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit. Checking PR state."
            PR_INFO=$(gh pr list --head bumps-${{ matrix.config }}-${{ github.sha }} --base main --repo kairos-io/hadron --state all --json number,state -q '.[0]')
            PR_NUMBER=$(echo "$PR_INFO" | jq -r '.number // empty')
            PR_STATE=$(echo "$PR_INFO" | jq -r '.state // empty')
            if [ -n "$PR_NUMBER" ]; then
              if [ "$PR_STATE" = "CLOSED" ]; then
                # Check if PR is merged
                MERGED_AT=$(gh pr view $PR_NUMBER --repo kairos-io/hadron --json mergedAt -q '.mergedAt')
                if [ -z "$MERGED_AT" ]; then
                  echo "PR #$PR_NUMBER is closed and not merged. Deleting remote 'bumps-${{ matrix.config }}' branch to allow clean recreation."
                  git push origin --delete bumps-${{ matrix.config }} || echo "Remote branch already deleted."
                else
                  echo "PR #$PR_NUMBER is merged. Nothing to do."
                fi
              else
                echo "Open PR #$PR_NUMBER already exists. Nothing to do."
              fi
            else
              echo "No PR found and no changes to commit. Nothing to do."
            fi
            exit 0
          fi
          
          # Commit and push changes
          git config user.name "ci-robbot"
          git config user.email "robot@c3os.io"
          
          # Prepare commit message with all changed files
          msg=$(
            git diff --cached -U0 |
            awk '
            BEGIN { old=""; new="" }
            
            # capture removed line (old)
            /^-/ && !/^---/ { old=substr($0,2); next }
            
            # capture added line (new) and try to pair with previous old
            /^\+/ && !/^\+\+\+/ {
              new=substr($0,2)
              
              # Only handle ARG ..._VERSION=... lines
              if (old ~ /^ARG[[:space:]]+[A-Z0-9]+_VERSION=/ && new ~ /^ARG[[:space:]]+[A-Z0-9]+_VERSION=/) {
              # extract name token between "ARG " and "_VERSION="
              tmp=old
              sub(/^ARG[[:space:]]+/, "", tmp)          # drop "ARG "
              sub(/_VERSION=.*/, "", tmp)               # keep just NAME part
              
              # extract versions (everything after "=")
              oldv=old; sub(/.*=/, "", oldv)
              newv=new; sub(/.*=/, "", newv)
              
              # normalize name: lowercase
              name=tmp
              for (i=1; i<=length(name); i++) {
                c=substr(name,i,1)
                if (c ~ /[A-Z]/) c=tolower(c)
                out=out c
              }
                
              print out " was updated " oldv " -> " newv
                
                out=""   # reset for next record
              }
                
              old=""
            }
            ' |
            head -n 8 |
            paste -sd ", " -
          )

          # Extract bumped names for PR title
          bumped_names=$(echo "$msg" | awk -F' was updated ' '{print $1}' | paste -sd ", " -)

          # Prepare commit message: summary, blank line, then details
          commit_msg="Automatic bumps for $bumped_names\n\n$msg"
          echo -e "$commit_msg" > /tmp/commit_msg.txt

          git commit -s -F /tmp/commit_msg.txt
          git push origin bumps-${{ matrix.config }}-${{ github.sha }} --force
          
          # Check if PR already exists (open or closed)
          PR_INFO=$(gh pr list --head bumps-${{ matrix.config }}-${{ github.sha }} --base main --repo kairos-io/hadron --state all --json number,state -q '.[0]')
          PR_NUMBER=$(echo "$PR_INFO" | jq -r '.number // empty')
          PR_STATE=$(echo "$PR_INFO" | jq -r '.state // empty')
          if [ -n "$PR_NUMBER" ]; then
            if [ "$PR_STATE" = "CLOSED" ]; then
              # Check if PR is merged
              MERGED_AT=$(gh pr view $PR_NUMBER --repo kairos-io/hadron --json mergedAt -q '.mergedAt')
              if [ -z "$MERGED_AT" ]; then
                echo "PR #$PR_NUMBER is closed and not merged. Attempting to reopen."
                if ! gh pr reopen $PR_NUMBER --repo kairos-io/hadron; then
                  echo "Failed to reopen PR. Creating a new one."
                  gh pr create --title "Automatic version bumps for $bumped_names" --body "${msg}" --head ci-forks:bumps-${{ matrix.config }}-${{ github.sha }} --base main --repo kairos-io/hadron
                fi
              else
                echo "PR #$PR_NUMBER is merged. Nothing to do."
              fi
            else
              echo "PR #$PR_NUMBER already exists and is open. Just pushed new changes."
            fi
          else
            echo "No PR found. Creating a new one."
            gh pr create --title "Automatic version bumps for: $bumped_names" --body "${msg}" --head ci-forks:bumps-${{ matrix.config }}-${{ github.sha }} --base main --repo kairos-io/hadron
          fi

